<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ライフシフト インテリジェンス</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23e84c4c'/><text y='.9em' font-size='72' x='10' fill='white' font-family='serif' font-weight='700'>LS</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#0a2240; --navy2:#1a3a60; --red:#e84c4c; --gold:#f9a825;
      --bg:#f5f6f8; --surface:#ffffff; --border:#e2e4e9;
      --text:#1a1d23; --muted:#6b7280; --hint:#9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#0f1117; --surface:#1a1d26; --border:#2a2d38; --text:#e8eaf0; --muted:#9ca3af; --hint:#6b7280; }
    }
    html, body { height: 100%; font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); }
    .hdr { background: var(--navy); color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.25); flex-wrap: wrap; gap: 8px; }
    .hdr-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 36px; height: 36px; background: var(--red); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; font-family: serif; flex-shrink: 0; }
    .hdr-title { font-size: 16px; font-weight: 500; letter-spacing: .04em; }
    .hdr-sub { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 2px; }
    .hdr-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .upd-badge { font-size: 11px; background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); padding: 4px 11px; border-radius: 20px; border: .5px solid rgba(255,255,255,.2); white-space: nowrap; }
    .hbtn { background: none; border: .5px solid rgba(255,255,255,.3); color: rgba(255,255,255,.85); padding: 6px 12px; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; transition: .15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .hbtn:hover { background: rgba(255,255,255,.12); color: #fff; }
    .prog-wrap { height: 3px; background: var(--border); }
    .prog-fill { height: 100%; background: var(--red); width: 0%; transition: width .4s; }
    .panel-tabs { display: none; background: var(--surface); border-bottom: 1px solid var(--border); }
    .ptab { flex: 1; padding: 10px; font-size: 13px; font-weight: 500; border: none; background: none; font-family: inherit; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: .15s; }
    .ptab.on { color: var(--navy); border-bottom-color: var(--red); }
    .cat-bar { display: flex; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; }
    .cat-bar::-webkit-scrollbar { display: none; }
    .ctab { padding: 9px 13px; font-size: 12px; color: var(--muted); cursor: pointer; border: none; border-bottom: 2px solid transparent; background: none; white-space: nowrap; font-family: inherit; transition: .15s; }
    .ctab.on { color: var(--navy); border-bottom-color: var(--red); font-weight: 500; }
    .ctab:hover:not(.on) { color: var(--text); }
    .toolbar { display: flex; gap: 8px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .srch { flex: 1; min-width: 140px; position: relative; }
    .srch input { width: 100%; padding: 8px 10px 8px 30px; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: inherit; }
    .srch input:focus { outline: none; border-color: var(--navy2); }
    .srch-ic { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 12px; pointer-events: none; color: var(--hint); }
    .fsort { padding: 8px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: inherit; cursor: pointer; }
    .stk-btn { padding: 8px 13px; font-size: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--muted); font-family: inherit; cursor: pointer; white-space: nowrap; transition: .15s; display: flex; align-items: center; gap: 5px; }
    .stk-btn.on { background: #fff8e1; border-color: var(--gold); color: #a06000; }
    .layout { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 120px); min-height: 500px; }
    .news-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; background: var(--bg); }
    .news-count { font-size: 11px; color: var(--muted); padding: 6px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .clr-kw { font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; cursor: pointer; font-family: inherit; }
    .news-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 9px; }
    .ncard { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all .15s; }
    .ncard:hover { border-color: #bcc4d0; box-shadow: 0 2px 8px rgba(0,0,0,.06); transform: translateY(-1px); }
    .ncard-top { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 5px; }
    .cdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .ntitle { font-size: 13px; font-weight: 500; line-height: 1.55; color: var(--text); flex: 1; }
    .sbtn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: none; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: .15s; color: var(--hint); }
    .sbtn:hover, .sbtn.on { color: var(--gold); border-color: var(--gold); }
    .nmeta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
    .nsrc { font-size: 11px; color: var(--muted); }
    .ndate { font-size: 11px; color: var(--hint); }
    .npill { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .nsum { font-size: 12px; color: var(--muted); line-height: 1.65; margin-top: 5px; }
    .nlnk { font-size: 11px; color: #1a6fc4; text-decoration: none; margin-top: 5px; display: inline-block; }
    .nlnk:hover { text-decoration: underline; }
    .spin-w { display: flex; align-items: center; gap: 9px; padding: 28px; justify-content: center; color: var(--muted); font-size: 13px; }
    .spin { width: 17px; height: 17px; border: 2px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: sp .8s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .empty { padding: 48px; text-align: center; color: var(--muted); font-size: 13px; }
    .chat-panel { display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
    .chat-hdr { padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
    .cico { width: 28px; height: 28px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; flex-shrink: 0; }
    .cname { font-size: 13px; font-weight: 500; }
    .csub { font-size: 11px; color: var(--muted); }
    .online { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; margin-left: auto; flex-shrink: 0; }
    .cbtn-clear { font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; cursor: pointer; font-family: inherit; margin-left: 6px; }
    .cmsgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 9px; }
    .msg { max-width: 93%; display: flex; flex-direction: column; gap: 3px; }
    .msg.u { align-self: flex-end; align-items: flex-end; }
    .msg.a { align-self: flex-start; align-items: flex-start; }
    .bub { padding: 9px 12px; border-radius: 13px; font-size: 13px; line-height: 1.65; }
    .msg.u .bub { background: var(--navy); color: #fff; border-radius: 13px 13px 3px 13px; }
    .msg.a .bub { background: var(--bg); border: 1px solid var(--border); border-radius: 13px 13px 13px 3px; color: var(--text); }
    .mt { font-size: 10px; color: var(--hint); }
    .copy-btn { font-size: 10px; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; cursor: pointer; color: var(--muted); font-family: inherit; margin-top: 2px; display: none; }
    .msg.a:hover .copy-btn { display: inline-block; }
    .dots { display: flex; gap: 3px; align-items: center; padding: 4px 0; }
    .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--hint); animation: bo 1s infinite; }
    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bo { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .qq-area { display: flex; flex-wrap: wrap; gap: 5px; padding: 7px 11px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
    .qq { font-size: 11px; padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; font-family: inherit; transition: .15s; }
    .qq:hover { background: var(--border); color: var(--text); }
    .cinput { padding: 10px 11px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; background: var(--surface); }
    .cta { flex: 1; padding: 8px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 9px; resize: none; min-height: 36px; max-height: 80px; font-family: inherit; background: var(--bg); color: var(--text); line-height: 1.5; }
    .cta:focus { outline: none; border-color: var(--navy2); }
    .sbtn2 { width: 36px; height: 36px; border-radius: 50%; background: var(--navy); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: .15s; }
    .sbtn2:hover { background: var(--navy2); }
    .sbtn2:disabled { background: var(--hint); cursor: default; }
    @media (max-width: 640px) {
      .panel-tabs { display: flex; }
      .layout { grid-template-columns: 1fr; height: calc(100vh - 150px); }
      .chat-panel { display: none; }
      .chat-panel.mobile-show { display: flex; }
      .news-panel.mobile-hide { display: none; }
      .hdr-sub { display: none; }
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════════
// キャッシュキー（日付ベース：1日1回更新）
// ═══════════════════════════════════════════

const API_KEY = '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';
const API_ENDPOINT = 'https://api.anthropic.com/v1/messages';
  
  function getTodayKey() {
  const d = new Date();
  return `ls_news_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

function getYesterdayKey() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return `ls_news_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

// 古いキャッシュを削除
function cleanOldCache() {
  const todayKey = getTodayKey();
  const yesterdayKey = getYesterdayKey();
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const k = localStorage.key(i);
    if (k && k.startsWith('ls_news_') && k !== todayKey && k !== yesterdayKey) {
      localStorage.removeItem(k);
    }
  }
}

const CATS = {
  all:{l:'すべて',c:'#0a2240'}, career:{l:'キャリア',c:'#1a6fc4'},
  money:{l:'マネー',c:'#2e7d32'}, health:{l:'健康',c:'#c62828'},
  policy:{l:'政策',c:'#6a1b9a'}, global:{l:'グローバル',c:'#e65100'},
  innovation:{l:'イノベ',c:'#00695c'}
};

const QUERIES = [
  { q: 'ミドルシニア キャリア転換 転職 副業 複業 シニア起業 リスキリング 2026', c: 'career' },
  { q: 'NISA iDeCo 老後資産形成 年金改革 インフレ シニア家計 2026', c: 'money' },
  { q: '健康寿命 予防医療 フレイル ウェルビーイング マインドフルネス シニア 2026', c: 'health' },
  { q: '高齢化社会 雇用政策 厚労省 地方移住 介護 社会保障改革 2026', c: 'policy' },
  { q: 'active aging longevity economy retirement reform silver economy 2026', c: 'global' },
  { q: 'AI シニア デジタル活用 ヘルステック 高齢者 スタートアップ 2026', c: 'innovation' }
];

const LSU_CONTEXT = `【ライフシフト大学テキスト要約】
■変身資産5領域: ①マインド②知恵③仲間④評判⑤健康
■マルチステージ型人生: 就労期60年（20〜80歳）のマルチステージへ
■80歳現役時代: 男81歳・女87歳（2024年）。長期間労働へ。
■5M: ①マインドセット②ミッション創造③学び④見える化⑤マルチ化
■変身資産チェック: Can×Will→Create。10年後ビジョンへのギャップを埋める。
■支援型リーダーシップ: 共感力・傾聴力・モチベート力・コーチング力
■イノベーターシップ: VUCAの時代に変革し続ける力。青銀共創。`;

let allNews = [], curCat = 'all', showStk = false, chatHist = [], chatBusy = false;

function nowStr() { return new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}); }
document.getElementById('initT').textContent = nowStr();

function getStocked()  { try { return JSON.parse(localStorage.getItem('ls_stocked') || '[]'); } catch { return []; } }
function saveStocked(a){ try { localStorage.setItem('ls_stocked', JSON.stringify(a)); } catch {} }

function toggleStk(id, btn, e) {
  e.stopPropagation();
  let s = getStocked();
  const i = s.indexOf(id);
  if (i >= 0) { s.splice(i, 1); btn.classList.remove('on'); btn.textContent = '☆'; }
  else         { s.push(id);    btn.classList.add('on');    btn.textContent = '★'; }
  saveStocked(s);
  updateStkCount(s.length);
  if (showStk) render();
}

function updateStkCount(n) {
  if (n === undefined) n = getStocked().length;
  document.getElementById('stkCnt').textContent = n;
  document.getElementById('stkToggle').className = 'stk-btn' + (showStk ? ' on' : '');
}

function toggleStkView() {
  showStk = !showStk;
  document.getElementById('stkToggle').className = 'stk-btn' + (showStk ? ' on' : '');
  render();
}

function setProgress(pct) { document.getElementById('prog').style.width = pct + '%'; }

// ═══════════════════════════════════════════
// ニュース取得（日付ベースキャッシュ付き）
// ═══════════════════════════════════════════
async function fetchQ(qObj) {
  try {
    fetch(API_ENDPOINT, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-beta': 'web-search-2025-03-05'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `あなたはライフシフト専門ニュース収集AIです。ウェブ検索で最新記事を3件取得し、JSON配列のみ返してください。
信頼できる情報源のみ: NHK,日経,読売,朝日,毎日,厚労省,内閣府,経産省,Reuters,BBC,FT,OECD等。
除外: まとめサイト,転載,個人ブログ。
各要素: id,title,source,url,summary(80字以内),date,category(${qObj.c}),isGlobal(boolean)`,
        messages: [{ role: 'user', content: `今日は${new Date().toLocaleDateString('ja-JP')}です。「${qObj.q}」を検索し、最新ニュース3件をJSON配列のみで返してください。` }]
      })
    });
    if (!r.ok) return [];
    const d = await r.json();
    const txt = d.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const s = txt.indexOf('['), e = txt.lastIndexOf(']');
    if (s < 0 || e < 0) return [];
    const arr = JSON.parse(txt.slice(s, e + 1));
    return arr.map((a, i) => ({
      ...a,
      id: a.id || (qObj.c + '_' + Date.now() + '_' + i),
      category: qObj.c  // カテゴリを必ず上書き
    }));
  } catch { return []; }
}

async function fetchAll(manual = false) {
  const todayKey = getTodayKey();

  if (!manual) {
    try {
      const cached = localStorage.getItem(todayKey);
      if (cached) {
        const parsed = JSON.parse(cached);
        if (parsed && parsed.length > 0) {
          allNews = parsed;
          const ts = new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
          document.getElementById('updBadge').textContent = `更新: ${ts}（キャッシュ）`;
          render();
          updateStkCount();
          return;
        }
      }
    } catch {}
  }

  cleanOldCache();
  document.getElementById('nl').innerHTML = '<div class="spin-w"><div class="spin"></div>最新ニュースを取得中...</div>';
  document.getElementById('updBadge').textContent = '取得中...';
  allNews = [];

  // 1件ずつ順番に取得（カテゴリを確実に設定）
  for (let i = 0; i < QUERIES.length; i++) {
    const q = QUERIES[i];
    const results = await fetchQ(q);
    // カテゴリを強制的に上書き
    const tagged = results.map(n => ({ ...n, category: q.c }));
    allNews = allNews.concat(tagged);
    setProgress(Math.round((i + 1) / QUERIES.length * 100));
    render();
    // 各リクエスト間に少し待機
    await new Promise(resolve => setTimeout(resolve, 200));
  }

  const seen = new Set();
  allNews = allNews.filter(n => {
    if (!n.title || seen.has(n.title)) return false;
    seen.add(n.title); return true;
  });

  try { localStorage.setItem(todayKey, JSON.stringify(allNews)); } catch {}

  setProgress(100);
  const ts = new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('updBadge').textContent = '更新: ' + ts;
  updateStkCount();
  setTimeout(() => setProgress(0), 1500);
}
// ═══════════════════════════════════════════
// レンダリング
// ═══════════════════════════════════════════
function render() {
  const kw = document.getElementById('kw').value.trim().toLowerCase();
  const sort = document.getElementById('sortSel').value;
  const stocked = getStocked();
  document.getElementById('clearKwBtn').style.display = kw ? 'inline' : 'none';

  let base = showStk
    ? allNews.filter(n => stocked.includes(n.id))
    : (curCat === 'all' ? allNews : allNews.filter(n => n.category === curCat));

  if (kw) base = base.filter(n => [(n.title||''),(n.summary||''),(n.source||'')].join(' ').toLowerCase().includes(kw));

  const seen = new Set();
  base = base.filter(n => { if (!n.title || seen.has(n.title)) return false; seen.add(n.title); return true; });

  if (sort === 'src') base.sort((a, b) => (a.source||'').localeCompare(b.source||'', 'ja'));
  else if (sort === 'old') base.sort((a, b) => (a.date||'').localeCompare(b.date||''));

  const items = base.slice(0, 50);
  document.getElementById('nc').textContent = `${items.length}件表示 / 取得済み${allNews.length}件${showStk?' [ストック]':''}${kw?` | "${kw}"`:''}`;

  const nl = document.getElementById('nl');
  if (items.length === 0) {
    nl.innerHTML = `<div class="empty">${showStk ? '⭐ ストックした記事がありません' : '📭 該当する記事がありません'}</div>`;
    return;
  }

  nl.innerHTML = items.map(n => {
    const cat = CATS[n.category] || CATS.career;
    const isS = stocked.includes(n.id);
    const enc = encodeURIComponent((n.title||'').slice(0, 80));
    const valid = n.url && n.url.startsWith('http');
    return `<div class="ncard" onclick="askNews('${enc}')">
      <div class="ncard-top">
        <div class="cdot" style="background:${cat.c}"></div>
        <div class="ntitle">${n.title||'タイトル不明'}</div>
        <button class="sbtn${isS?' on':''}" onclick="toggleStk('${n.id}',this,event)">${isS?'★':'☆'}</button>
      </div>
      <div class="nmeta">
        <span class="nsrc">${n.isGlobal?'🌍':'📰'} ${n.source||'不明'}</span>
        ${n.date?`<span class="ndate">${n.date}</span>`:''}
        <span class="npill" style="background:${cat.c}18;color:${cat.c}">${cat.l}</span>
      </div>
      ${n.summary?`<div class="nsum">${n.summary}</div>`:''}
      ${valid?`<a class="nlnk" href="${n.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">記事を読む →</a>`:''}
    </div>`;
  }).join('');
}

function clearKw() { document.getElementById('kw').value = ''; render(); }
function swCat(cat, btn) {
  curCat = cat; showStk = false;
  document.getElementById('stkToggle').className = 'stk-btn';
  document.querySelectorAll('.ctab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function switchPanel(panel, btn) {
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  const np = document.getElementById('newsPane');
  const cp = document.getElementById('chatPane');
  if (panel === 'news') { np.classList.remove('mobile-hide'); cp.classList.remove('mobile-show'); }
  else { np.classList.add('mobile-hide'); cp.classList.add('mobile-show'); }
}

function askNews(enc) {
  const title = decodeURIComponent(enc);
  const ta = document.getElementById('cta');
  ta.value = `「${title}」についてライフシフトの観点から詳しく解説してください。`;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 80) + 'px';
  if (window.innerWidth <= 640) switchPanel('chat', document.querySelectorAll('.ptab')[1]);
  ta.focus();
}

function qQ(q) { document.getElementById('cta').value = q; sendChat(); }

function appendMsg(role, text) {
  const c = document.getElementById('cmsgs');
  const d = document.createElement('div');
  const id = 'cp_' + Date.now();
  d.className = 'msg ' + role;
  d.innerHTML = `<div class="bub"${role==='a'?` id="${id}"`:''}>${text.replace(/\n/g,'<br>')}</div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="mt">${nowStr()}</div>
      ${role==='a'?`<button class="copy-btn" onclick="copyText('${id}')">コピー</button>`:''}
    </div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function copyText(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = el.parentElement.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✓ コピー済み'; setTimeout(() => btn.textContent = 'コピー', 1500); }
  });
}

function showTyping() {
  const c = document.getElementById('cmsgs');
  const d = document.createElement('div');
  d.className = 'msg a'; d.id = 'typ';
  d.innerHTML = `<div class="bub"><div class="dots"><span></span><span></span><span></span></div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function hideTyping() { const e = document.getElementById('typ'); if (e) e.remove(); }

function clearChat() {
  chatHist = [];
  document.getElementById('cmsgs').innerHTML =
    `<div class="msg a"><div class="bub">チャット履歴をクリアしました。新しい質問をどうぞ！</div><div class="mt">${nowStr()}</div></div>`;
}

async function sendChat() {
  if (chatBusy) return;
  const ta = document.getElementById('cta');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = ''; ta.style.height = 'auto';
  chatBusy = true;
  document.getElementById('sendBtn').disabled = true;

  appendMsg('u', text);
  chatHist.push({ role: 'user', content: text });
  showTyping();

  const recentNews = allNews.slice(0, 25).map(n => `[${CATS[n.category]?.l||n.category}][${n.source}] ${n.title} — ${n.summary||''}`).join('\n');
  const stocked = getStocked();
  const stkNews = allNews.filter(n => stocked.includes(n.id)).map(n => `★[${n.source}] ${n.title}`).join('\n');

  try {
    fetch(API_ENDPOINT, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-beta': 'web-search-2025-03-05'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `あなたは「ライフシフト」専門AIアドバイザーです。\n${LSU_CONTEXT}\n【収集済みニュース】\n${recentNews||'（取得中）'}${stkNews?`\n【ストック記事】\n${stkNews}`:''}\n回答: 日本語・具体的・最大400字。`,
        messages: chatHist.slice(-10)
      })
    });
    const d = await r.json();
    const reply = d.content.filter(b => b.type === 'text').map(b => b.text).join('').trim() || '申し訳ありません。もう一度お試しください。';
    chatHist.push({ role: 'assistant', content: reply });
    hideTyping();
    appendMsg('a', reply);
  } catch {
    hideTyping();
    appendMsg('a', 'エラーが発生しました。しばらくしてから再度お試しください。');
  }

  chatBusy = false;
  document.getElementById('sendBtn').disabled = false;
}

updateStkCount();
fetchAll();
</script>
